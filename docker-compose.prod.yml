# Overseer – Production Docker Compose
#
# Prerequisites:
#   1. Copy .env.example → .env and fill in all values
#   2. Place TLS certificates in ./deploy/ssl/:
#        fullchain.pem  – certificate chain
#        privkey.pem    – private key
#      (use certbot / Let's Encrypt or your own CA)
#   3. Build and start: docker compose -f docker-compose.prod.yml up -d --build
#   4. Load schema (first run only):
#        docker compose -f docker-compose.prod.yml exec postgres \
#          psql -U overseer -d overseer -f /docker-entrypoint-initdb.d/001_initial.sql
#   5. Seed admin user:
#        docker compose -f docker-compose.prod.yml exec api \
#          python scripts/seed_dev_data.py
#
# Access:
#   https://your-domain/        → Frontend
#   https://your-domain/api/    → REST API
#   https://your-domain/receiver/ → Collector endpoint

services:
  # ==================== Infrastructure ====================

  postgres:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: overseer
      POSTGRES_USER: overseer
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    # No exposed ports – only reachable inside Docker network
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overseer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # No exposed ports
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Backend ====================

  receiver:
    build:
      context: .
      dockerfile: receiver/Dockerfile
    restart: unless-stopped
    # No exposed ports – Nginx proxies to this
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql+asyncpg://overseer:${POSTGRES_PASSWORD}@postgres:5432/overseer
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql+asyncpg://overseer:${POSTGRES_PASSWORD}@postgres:5432/overseer
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    restart: unless-stopped
    # No exposed ports – Nginx proxies to this
    environment:
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      DATABASE_URL: postgresql+asyncpg://overseer:${POSTGRES_PASSWORD}@postgres:5432/overseer
      SECRET_KEY: ${SECRET_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    # No exposed ports – Nginx proxies to this container's port 80

  # ==================== Reverse Proxy ====================

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
      - receiver
      - frontend

volumes:
  pgdata:
  redisdata:
